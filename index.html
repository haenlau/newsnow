<!doctype html>
<html lang="zh-CN" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO Meta Tags -->
  <meta name="description" content="Air1 News is a fast real-time news reader in the Air1 Quick Tools collection." />
  <meta name="keywords" content="Air1 News, Air1 Quick Tools, news, real-time news, news reader" />
  <meta name="author" content="Air1" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Air1 News" />
  <meta property="og:description" content="A quiet, fast news reader for Air1 Quick Tools." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://news.air1.cn/" />
  <meta property="og:image" content="https://news.air1.cn/og-image.png" />
  <meta property="og:site_name" content="Air1 News" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Air1 News" />
  <meta name="twitter:description" content="A quiet, fast news reader for Air1 Quick Tools." />
  <meta name="twitter:image" content="https://news.air1.cn/og-image.png" />

  <meta name="theme-color" content="#0EA5E9" />
  <link rel="preload" href="/Baloo2-Bold.subset.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

  <!-- Schema.org markup for Google -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Air1 News",
      "url": "https://news.air1.cn/",
      "description": "A quiet, fast news reader for Air1 Quick Tools."
    }
  </script>

  <script>
    const query = new URLSearchParams(window.location.search)
    if (query.has("login") && query.has("user") && query.has("jwt")) {
      localStorage.setItem("user", query.get("user"))
      localStorage.setItem("jwt", JSON.stringify(query.get("jwt")))
      window.history.replaceState({}, document.title, window.location.pathname)
    }
  </script>
  <title>Air1 News</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
